<!DOCTYPE html>
<html lang="en" data-theme="dark">

/* Start Coding */

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>MiloHakai</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root {
      /* --- Palette: monochrome "astrophoto plate" --- */
      --bg: #050505;
      --bg2: #070707;
      --text: rgba(245, 245, 245, 0.92);
      --text-dim: rgba(245, 245, 245, 0.60);
      --line: rgba(255, 255, 255, 0.90);
      --line-soft: rgba(255, 255, 255, 0.45);
      --glow: rgba(255, 255, 255, 0.40);

      /* Space plate */
      --band-strong: rgba(255, 255, 255, 0.20);
      --band-soft: rgba(255, 255, 255, 0.08);
      --mist: rgba(255, 255, 255, 0.06);
      --dust: rgba(255, 255, 255, 0.12);

      /* CRT */
      --scanline: rgba(0, 0, 0, 0.18);
      --vignette: rgba(0, 0, 0, 0.55);
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    /* Light theme overrides (kept, but dark is primary) */
    [data-theme="light"] {
      --bg: #fbfbfb;
      --bg2: #f3f3f3;
      --text: rgba(15, 15, 15, 0.92);
      --text-dim: rgba(15, 15, 15, 0.60);
      --line: rgba(0, 0, 0, 0.90);
      --line-soft: rgba(0, 0, 0, 0.45);
      --glow: rgba(0, 0, 0, 0.30);

      --band-strong: rgba(0, 0, 0, 0.16);
      --band-soft: rgba(0, 0, 0, 0.07);
      --mist: rgba(0, 0, 0, 0.05);
      --dust: rgba(0, 0, 0, 0.10);

      --scanline: rgba(0, 0, 0, 0.08);
      --vignette: rgba(0, 0, 0, 0.20);
    }

    body {
      position: relative;
      background: var(--bg);
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* ─────────────────────────────────────────────────────────────
       SPACE PLATE BACKGROUND (galaxy band + dithering + crescents)
       ───────────────────────────────────────────────────────────── */

    .wave-text {
      background: linear-gradient(90deg,
          #ffffff 0%,
          #ffffff 40%,
          #000000 50%,
          #ffffff 60%,
          #ffffff 100%);

      background-size: 300% 100%;

      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;

      animation: wave-effect 6s linear infinite;

      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.35),
        0 0 20px rgba(255, 255, 255, 0.15);
    }

    /* Light theme version */
    [data-theme="light"] .wave-text {
      background: linear-gradient(90deg,
          #000000 0%,
          #000000 40%,
          #ffffff 50%,
          #000000 60%,
          #000000 100%);

      background-size: 300% 100%;

      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .space-plate {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, var(--bg2), var(--bg));
    }

    /* Galaxy band + soft mist */
    .space-plate::before {
      content: "";
      position: absolute;
      inset: -25%;
      transform: rotate(-18deg) scale(1.25);
      opacity: 0.98;

      background:
        radial-gradient(ellipse 170% 22% at 72% 62%,
          var(--band-strong) 0%,
          var(--band-soft) 38%,
          rgba(255, 255, 255, 0.03) 58%,
          transparent 78%),

        radial-gradient(ellipse 70% 45% at 18% 28%,
          var(--mist) 0%,
          transparent 72%),

        radial-gradient(ellipse 60% 40% at 90% 84%,
          var(--mist) 0%,
          transparent 75%);
    }

    /* Dithering / grain */
    .space-plate::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.22;
      mix-blend-mode: screen;
      background-image: radial-gradient(var(--dust) 1px, transparent 1px);
      background-size: 2px 2px;
    }

    /* Crescent moons (pure CSS) */
    .moon {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.75;
      filter: drop-shadow(0 0 10px var(--glow));
    }

    .moon.big {
      width: 220px;
      height: 220px;
      top: 10%;
      left: 10%;
      background:
        radial-gradient(circle at 30% 35%,
          transparent 60%,
          var(--line) 61%,
          rgba(255, 255, 255, 0.95) 63%,
          rgba(255, 255, 255, 0.75) 66%,
          transparent 70%);
    }

    .moon.small {
      width: 110px;
      height: 110px;
      top: 32%;
      left: 46%;
      opacity: 0.55;
      background:
        radial-gradient(circle at 32% 38%,
          transparent 60%,
          var(--line-soft) 61%,
          rgba(255, 255, 255, 0.70) 64%,
          transparent 70%);
    }

    /* Star canvas on top of plate, below UI */
    #starCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────────────────────
       CRT OVERLAY
       ───────────────────────────────────────────────────────────── */

    .crt-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    .crt-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          var(--scanline) 0px,
          var(--scanline) 2px,
          transparent 2px,
          transparent 5px);
      animation: scanScroll 10s linear infinite;
    }

    @keyframes scanScroll {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(5px);
      }
    }


    .crt-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
          transparent 0%,
          transparent 55%,
          var(--vignette) 100%);
    }

    /* Subtle flicker */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.006);
      pointer-events: none;
      z-index: 998;
      animation: flicker 6.5s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes flicker {

      0%,
      100% {
        opacity: 0;
      }

      50% {
        opacity: 0.28;
      }
    }

    /* ─────────────────────────────────────────────────────────────
       ANIMATED BORDERS (monochrome)
       ───────────────────────────────────────────────────────────── */

    .border-segments {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .border-top,
    .border-right,
    .border-bottom,
    .border-left {
      position: absolute;
      opacity: 0.9;
    }

    .border-top {
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
          transparent 0%, transparent 25%,
          var(--line-soft) 38%, var(--line) 50%, var(--line-soft) 62%,
          transparent 75%, transparent 100%);
      background-size: 300% 100%;
      box-shadow: 0 0 12px var(--glow);
      animation: moveH 11s linear infinite;
    }

    .border-right {
      top: 0;
      right: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg,
          transparent 0%, transparent 25%,
          var(--line-soft) 38%, var(--line) 50%, var(--line-soft) 62%,
          transparent 75%, transparent 100%);
      background-size: 100% 300%;
      box-shadow: -6px 0 16px var(--glow);
      animation: moveV 11s linear infinite 2.75s;
    }

    .border-bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(-90deg,
          transparent 0%, transparent 25%,
          var(--line-soft) 38%, var(--line) 50%, var(--line-soft) 62%,
          transparent 75%, transparent 100%);
      background-size: 300% 100%;
      box-shadow: 0 -6px 16px var(--glow);
      animation: moveH 11s linear infinite 5.5s;
    }

    .border-left {
      top: 0;
      left: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(-180deg,
          transparent 0%, transparent 25%,
          var(--line-soft) 38%, var(--line) 50%, var(--line-soft) 62%,
          transparent 75%, transparent 100%);
      background-size: 100% 300%;
      box-shadow: 6px 0 16px var(--glow);
      animation: moveV 11s linear infinite 8.25s;
    }

    .border-line-2.border-top {
      animation-delay: 5.5s;
      opacity: 0.55;
    }

    .border-line-2.border-right {
      animation-delay: 8.25s;
      opacity: 0.55;
    }

    .border-line-2.border-bottom {
      animation-delay: 0s;
      opacity: 0.55;
    }

    .border-line-2.border-left {
      animation-delay: 2.75s;
      opacity: 0.55;
    }

    @keyframes moveH {
      0% {
        background-position: -100% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes moveV {
      0% {
        background-position: 0 -100%;
      }

      100% {
        background-position: 0 200%;
      }
    }

    /* ─────────────────────────────────────────────────────────────
       UI / CONTENT
       ───────────────────────────────────────────────────────────── */

    .container {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      cursor: pointer;
      user-select: none;
      position: relative;
      display: inline-block;
      line-height: 1.25;
      color: var(--text);
      text-shadow:
        0 0 10px var(--glow),
        0.6px 0 0 rgba(255, 0, 0, 0.10),
        -0.6px 0 0 rgba(0, 255, 255, 0.10);
      animation: titlePulse 4s ease-in-out infinite;
    }

    @keyframes titlePulse {

      0%,
      100% {
        text-shadow:
          0 0 10px var(--glow),
          0.6px 0 0 rgba(255, 0, 0, 0.10),
          -0.6px 0 0 rgba(0, 255, 255, 0.10);
      }

      50% {
        text-shadow:
          0 0 16px var(--glow),
          0.9px 0 0 rgba(255, 0, 0, 0.12),
          -0.9px 0 0 rgba(0, 255, 255, 0.12);
      }
    }

    @keyframes wave-effect {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -100% 0;
      }
    }

    p {
      font-size: 0.72rem;
      line-height: 1.9;
      margin: 1.2rem 0 0;
      color: var(--text-dim);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.12);
      letter-spacing: 0.05em;
    }

    .icons {
      display: flex;
      gap: 2.2rem;
      margin-top: 2rem;
    }

    .icons a {
      color: var(--text-dim);
      font-size: 1.6rem;
      transition: all 0.25s ease;
      position: relative;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.12);
    }

    .icons a:hover {
      color: var(--text);
      transform: translateY(-5px) scale(1.1);
      text-shadow: 0 0 18px var(--glow);
    }

    .icons a::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 100%;
      height: 1px;
      background: var(--line);
      box-shadow: 0 0 10px var(--glow);
      transition: transform 0.25s ease;
    }

    .icons a:hover::after {
      transform: translateX(-50%) scaleX(1);
    }

    /* Click counter */
    .click-counter {
      margin-top: 1.2rem;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;

      font-size: 0.65rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    [data-theme="light"] .click-counter p {
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
    }

    .click-counter.show {
      opacity: 1;
      transform: translateY(0);
    }

    .click-counter p {
      margin: 0;
      color: var(--text-dim);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.10);
    }

    #clickCount {
      color: var(--text);
      text-shadow: 0 0 10px var(--glow);
    }

    footer {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      text-align: center;
      z-index: 10;
      line-height: 2;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.08);
    }

    footer a {
      color: var(--text-dim);
      text-decoration: none;
      position: relative;
      transition: color 0.25s;
    }

    footer a:hover {
      color: var(--text);
      text-shadow: 0 0 10px var(--glow);
    }

    footer a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--line);
      transition: width 0.25s ease;
    }

    footer a:hover::after {
      width: 100%;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 12;
      width: 46px;
      height: 46px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.14);
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s, border-color 0.25s;
      backdrop-filter: blur(2px);
    }

    [data-theme="light"] .theme-toggle {
      background: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.14);
    }

    .theme-toggle:hover {
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.14);
    }

    [data-theme="light"] .theme-toggle:hover {
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.12);
    }

    .theme-toggle .theme-icon {
      position: absolute;
      inset: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: opacity 0.25s ease, transform 0.25s ease;
      opacity: 0;
      transform: translateY(-6px) scale(0.95);
      visibility: hidden;
      pointer-events: none;
      color: var(--text);
    }

    [data-theme="dark"] .theme-toggle .moon-icon {
      opacity: 1;
      transform: translateY(0) scale(1);
      visibility: visible;
    }

    [data-theme="light"] .theme-toggle .sun-icon {
      opacity: 1;
      transform: translateY(0) scale(1);
      visibility: visible;
    }

    /* ─────────────────────────────────────────────────────────────
       SPLASH (typing + click to enter)
       ───────────────────────────────────────────────────────────── */

    .splash-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.85s ease, visibility 0.85s ease;
    }

    .splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
    }

    .splash-ring {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      animation: ringPulse 3.2s ease-in-out infinite;
      pointer-events: none;
    }

    .splash-ring:nth-child(2) {
      width: 340px;
      height: 340px;
      animation-delay: 0.55s;
    }

    .splash-ring:nth-child(3) {
      width: 480px;
      height: 480px;
      animation-delay: 1.1s;
    }

    @keyframes ringPulse {

      0%,
      100% {
        opacity: 0.25;
        transform: scale(1);
      }

      50% {
        opacity: 0.65;
        transform: scale(1.03);
      }
    }

    .typing-text {
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid var(--line);
      padding-right: 6px;
      color: var(--text);
      text-shadow: 0 0 14px var(--glow);
      letter-spacing: 0.15em;
      font-size: 1.25rem;
    }

    .typing-text.typing {
      animation: blinkCaret 0.75s step-end infinite;
    }

    @keyframes blinkCaret {

      from,
      to {
        border-color: transparent;
      }

      50% {
        border-color: var(--line);
      }
    }

    .splash-hint {
      font-size: 0.5rem;
      color: rgba(255, 255, 255, 0.40);
      letter-spacing: 0.22em;
      animation: hintBlink 2s ease-in-out infinite;
    }

    [data-theme="light"] .splash-hint {
      color: rgba(0, 0, 0, 0.35);
    }

    @keyframes hintBlink {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 0.9;
      }
    }

    /* Accessibility: reduce motion */
    @media (prefers-reduced-motion: reduce) {

      .border-top,
      .border-right,
      .border-bottom,
      .border-left,
      .crt-overlay::before,
      body::before,
      h1,
      .splash-ring,
      .splash-hint {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <!-- Space plate background -->
  <div class="space-plate" aria-hidden="true"></div>
  <div class="moon big" aria-hidden="true"></div>
  <div class="moon small" aria-hidden="true"></div>
  <canvas id="starCanvas" aria-hidden="true"></canvas>

  <!-- CRT overlay -->
  <div class="crt-overlay" aria-hidden="true"></div>

  <!-- Splash -->
  <div class="splash-screen" id="splashScreen" role="dialog" aria-label="Welcome">
    <div class="splash-content">
      <div class="splash-ring"></div>
      <div class="splash-ring"></div>
      <div class="splash-ring"></div>
      <div class="typing-text" id="splashTitle">MiloHakai</div>
    </div>
  </div>

  <!-- Animated borders -->
  <div class="border-segments" aria-hidden="true">
    <div class="border-top border-line-1"></div>
    <div class="border-right border-line-1"></div>
    <div class="border-bottom border-line-1"></div>
    <div class="border-left border-line-1"></div>
    <div class="border-top border-line-2"></div>
    <div class="border-right border-line-2"></div>
    <div class="border-bottom border-line-2"></div>
    <div class="border-left border-line-2"></div>
  </div>

  <!-- Theme toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <i class="fas fa-sun theme-icon sun-icon"></i>
    <i class="fas fa-moon theme-icon moon-icon"></i>
  </button>

  <!-- Main content -->
  <div class="container">
    <h1 id="username" class="wave-text" onclick="playClickSound()">MiloHakai</h1>
    <p>Student and occasional streamer from Italy.</p>

    <div id="clickCounter" class="click-counter" style="display:none;">
      <p>Hey! You clicked me <span id="clickCount">0</span> times.</p>
    </div>

    <div class="icons">
      <a href="https://discord.gg/mhfnh6j9uQ" title="Discord" target="_blank" rel="noopener"><i
          class="fab fa-discord"></i></a>
      <a href="https://github.com/MiloHakai" title="GitHub" target="_blank" rel="noopener"><i
          class="fab fa-github"></i></a>
      <a href="https://steamcommunity.com/id/5483625764" title="Steam" target="_blank" rel="noopener"><i
          class="fab fa-steam"></i></a>
      <a href="https://twitch.tv/MiloHakai" title="Twitch" target="_blank" rel="noopener"><i
          class="fab fa-twitch"></i></a>
    </div>
  </div>

  <footer>
    Copyright © 2026–present MiloHakai // OutOfTune<br>
    Heavily inspired by <a href="https://github.com/spectrapulse" target="_blank" rel="noopener">SpectraPulse</a>
  </footer>

  <!-- Audio -->
  <audio id="backgroundAudio" preload="auto" loop muted playsinline>
    <source src="./bgm.mp3" type="audio/mpeg">
    <source src="./bgm.flac" type="audio/flac">
  </audio>

  <audio id="clickSound" preload="auto">
    <source src="./click-sound.mp3" type="audio/mpeg">
    <source src="./click-sound.ogg" type="audio/ogg">
  </audio>

  <script>
    /* ─────────────────────────────────────────────────────────────
       THEME (dark default)
       ───────────────────────────────────────────────────────────── */
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute("data-theme");
      html.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }

    /* ─────────────────────────────────────────────────────────────
       STARFIELD (monochrome) + occasional shooting star
       ───────────────────────────────────────────────────────────── */
    (function () {
      const canvas = document.getElementById('starCanvas');
      const ctx = canvas.getContext('2d', { alpha: true });
      let W = 0, H = 0;
      let stars = [];
      let shooting = null;

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = canvas.width = Math.floor(window.innerWidth * dpr);
        H = canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in CSS pixels
        initStars();
      }

      function rand(min, max) { return min + Math.random() * (max - min); }

      function initStars() {
        stars = [];
        const area = window.innerWidth * window.innerHeight;
        const count = Math.min(Math.floor(area / 2600), 900);

        for (let i = 0; i < count; i++) {
          const r = Math.random();
          stars.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: r < 0.70 ? rand(0.35, 0.9) : r < 0.93 ? rand(0.9, 1.3) : rand(1.3, 1.9),
            a: rand(0.20, 0.90),
            tw: rand(0.004, 0.010),
            off: rand(0, Math.PI * 2),
            spike: Math.random() < 0.016
          });
        }
      }

      function starColor(alpha) {
        const theme = document.documentElement.getAttribute("data-theme");
        return theme === "light"
          ? `rgba(0,0,0,${alpha})`
          : `rgba(255,255,255,${alpha})`;
      }

      function drawStar(s, t) {
        const twinkle = Math.sin(t * s.tw * 60 + s.off);
        const a = s.a * (0.75 + 0.25 * twinkle);
        const sz = s.size * (0.9 + 0.1 * twinkle);

        if (s.spike) {
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.strokeStyle = starColor(a);
          ctx.lineWidth = 0.6;
          const len = sz * 3.6;
          for (let i = 0; i < 4; i++) {
            ctx.save();
            ctx.rotate(i * Math.PI / 4);
            ctx.globalAlpha = (i < 2 ? 1 : 0.55);
            ctx.beginPath();
            ctx.moveTo(0, -len); ctx.lineTo(0, len);
            ctx.stroke();
            ctx.restore();
          }
          ctx.restore();
        }

        ctx.beginPath();
        ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
        ctx.fillStyle = starColor(a);
        ctx.fill();

        if (s.spike) {
          const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sz * 5);
          const theme = document.documentElement.getAttribute("data-theme");
          if (theme === "light") {
            g.addColorStop(0, `rgba(0,0,0,${a * 0.18})`);
          } else {
            g.addColorStop(0, `rgba(255,255,255,${a * 0.22})`);
          }
          g.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(s.x, s.y, sz * 5, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        }
      }

      function maybeShoot() {
        if (!shooting && Math.random() < 0.0028) {
          shooting = {
            x: Math.random() * window.innerWidth * 0.65,
            y: Math.random() * window.innerHeight * 0.35,
            vx: rand(7, 12),
            vy: rand(2.5, 5),
            life: 1
          };
        }
        if (shooting) {
          const theme = document.documentElement.getAttribute("data-theme");
          const head = theme === "light" ? "rgba(0,0,0," : "rgba(255,255,255,";
          ctx.strokeStyle = `${head}${shooting.life * 0.55})`;
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(shooting.x, shooting.y);
          ctx.lineTo(shooting.x - shooting.vx * 10, shooting.y - shooting.vy * 10);
          ctx.stroke();

          shooting.x += shooting.vx;
          shooting.y += shooting.vy;
          shooting.life -= 0.03;

          if (shooting.life <= 0 || shooting.x > window.innerWidth || shooting.y > window.innerHeight) {
            shooting = null;
          }
        }
      }

      function draw(t) {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        for (const s of stars) drawStar(s, t);
        maybeShoot();
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(draw);
    })();

    /* ─────────────────────────────────────────────────────────────
       CLICK COUNTER + SOUND
       ───────────────────────────────────────────────────────────── */
    let clickCount = 0;
    const clickCounter = document.getElementById('clickCounter');
    const clickCountSpan = document.getElementById('clickCount');

    function playClickSound() {
      const s = document.getElementById('clickSound');
      if (s) {
        s.currentTime = 0;
        s.play().catch(() => { });
      }
      clickCount++;
      clickCountSpan.textContent = clickCount;
      if (clickCount === 1) {
        clickCounter.style.display = 'block';
        setTimeout(() => clickCounter.classList.add('show'), 10);
      }
    }

    /* ─────────────────────────────────────────────────────────────
       BACKGROUND AUDIO (muted autoplay then unmute on first gesture)
       ───────────────────────────────────────────────────────────── */
    (function () {
      const bg = document.getElementById('backgroundAudio');
      if (!bg) return;
      bg.muted = true;
      bg.volume = 0.3;
      bg.play().catch(() => { });

      const unmute = () => {
        bg.muted = false;
        bg.volume = 0.3;
        if (bg.paused) bg.play().catch(() => { });
      };

      ['pointerdown', 'touchstart', 'mousedown', 'keydown'].forEach(ev =>
        document.addEventListener(ev, unmute, { once: true, capture: true })
      );
    })();

    /* ─────────────────────────────────────────────────────────────
       SPLASH typing + hide
       ───────────────────────────────────────────────────────────── */
    (function () {
      const splash = document.getElementById('splashScreen');
      const splashTitle = document.getElementById('splashTitle');
      const mainTitle = document.getElementById('username');
      const text = (mainTitle && mainTitle.textContent.trim()) || 'MiloHakai';

      function typeText(el, str, delay, done) {
        el.textContent = '';
        el.classList.add('typing');
        let i = 0;
        const t = setInterval(() => {
          el.textContent += str[i++];
          if (i >= str.length) {
            clearInterval(t);
            el.classList.remove('typing');
            if (done) done();
          }
        }, delay);
      }

      function hide() {
        if (splash) splash.classList.add('hidden');
      }

      if (splash && splashTitle) {
        typeText(splashTitle, text, 75, () => setTimeout(hide, 900));
        splash.addEventListener('pointerdown', hide, { once: true });
      }
    })();
  </script>
</body>

</html>
