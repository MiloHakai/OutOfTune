<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Umilushi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a0f2e;
      --bg-light: #e8f4f8;
      --text-dark: #a8e6cf;
      --text-light: #2d5a6b;
      --border-color-dark: #4dd9d9;
      --border-color-light: #3ca0a0;
      --glow-color-dark: rgba(77, 217, 217, 0.8);
      --glow-color-light: rgba(60, 160, 160, 0.8);
      --accent-cyan: #4dd9d9;
      --accent-purple: #9b59b6;
      --accent-orange: #f39c12;
      --rampage-red: #ff2a2a;
      --rampage-orange: #ff8a00;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-dark);
      transition: background 0.5s ease, color 0.5s ease;
      position: relative;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 20, 0.57);
      z-index: 0;
      transition: background 0.4s ease;
    }

    [data-theme="light"] body {
      background-color: var(--bg-light);
      color: var(--text-light);
    }

    [data-theme="light"] body::before {
      background: linear-gradient(135deg,
          rgba(232, 244, 248, 0.85) 0%,
          rgba(168, 230, 207, 0.75) 50%,
          rgba(77, 217, 217, 0.65) 100%);
    }

    body.rampage {
      background-image: url('./1cbc3479-5b28-441d-8b18-e21f1c878949.png');
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      animation: rampage-screen-shake 0.22s steps(2, end) infinite;
    }

    body.rampage::before {
      background: linear-gradient(180deg,
          rgba(40, 0, 0, 0.28) 0%,
          rgba(0, 0, 0, 0.10) 45%,
          rgba(120, 0, 0, 0.22) 100%);
    }

    [data-theme="light"] body.rampage::before {
      background: linear-gradient(180deg,
          rgba(55, 0, 0, 0.2) 0%,
          rgba(0, 0, 0, 0.08) 40%,
          rgba(130, 10, 10, 0.18) 100%);
    }

    .border-segments {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 1;
    }

    .border-top,
    .border-right,
    .border-bottom,
    .border-left {
      position: absolute;
    }

    .border-top {
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg,
          transparent 0%,
          transparent 30%,
          #4dd9d9 40%,
          #9b59b6 50%,
          #4dd9d9 60%,
          transparent 70%,
          transparent 100%);
      background-size: 300% 100%;
      animation: move-horizontal 12s linear infinite;
    }

    .border-right {
      top: 0;
      right: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg,
          transparent 0%,
          transparent 30%,
          #4dd9d9 40%,
          #9b59b6 50%,
          #4dd9d9 60%,
          transparent 70%,
          transparent 100%);
      background-size: 100% 300%;
      animation: move-vertical 12s linear infinite;
    }

    .border-bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(-90deg,
          transparent 0%,
          transparent 30%,
          #4dd9d9 40%,
          #9b59b6 50%,
          #4dd9d9 60%,
          transparent 70%,
          transparent 100%);
      background-size: 300% 100%;
      animation: move-horizontal-reverse 12s linear infinite;
    }

    .border-left {
      top: 0;
      left: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(-180deg,
          transparent 0%,
          transparent 30%,
          #4dd9d9 40%,
          #9b59b6 50%,
          #4dd9d9 60%,
          transparent 70%,
          transparent 100%);
      background-size: 100% 300%;
      animation: move-vertical-reverse 12s linear infinite;
    }

    [data-theme="light"] .border-top {
      background: linear-gradient(90deg,
          transparent 0%,
          transparent 30%,
          #3ca0a0 40%,
          #8e44ad 50%,
          #3ca0a0 60%,
          transparent 70%,
          transparent 100%) !important;
    }

    [data-theme="light"] .border-right {
      background: linear-gradient(180deg,
          transparent 0%,
          transparent 30%,
          #3ca0a0 40%,
          #8e44ad 50%,
          #3ca0a0 60%,
          transparent 70%,
          transparent 100%) !important;
    }

    [data-theme="light"] .border-bottom {
      background: linear-gradient(-90deg,
          transparent 0%,
          transparent 30%,
          #3ca0a0 40%,
          #8e44ad 50%,
          #3ca0a0 60%,
          transparent 70%,
          transparent 100%) !important;
    }

    [data-theme="light"] .border-left {
      background: linear-gradient(-180deg,
          transparent 0%,
          transparent 30%,
          #3ca0a0 40%,
          #8e44ad 50%,
          #3ca0a0 60%,
          transparent 70%,
          transparent 100%) !important;
    }

    body.rampage .border-top,
    body.rampage .border-right,
    body.rampage .border-bottom,
    body.rampage .border-left,
    [data-theme="light"] body.rampage .border-top,
    [data-theme="light"] body.rampage .border-right,
    [data-theme="light"] body.rampage .border-bottom,
    [data-theme="light"] body.rampage .border-left {
      background-image: linear-gradient(90deg,
          transparent 0%,
          transparent 25%,
          #ff2a2a 40%,
          #ff8a00 50%,
          #ff2a2a 60%,
          transparent 75%,
          transparent 100%) !important;
      box-shadow: 0 0 8px rgba(255, 80, 0, 0.8), 0 0 18px rgba(255, 30, 30, 0.55);
    }

    .border-line-1.border-top { animation-delay: 0s; }
    .border-line-1.border-right { animation-delay: 3s; }
    .border-line-1.border-bottom { animation-delay: 6s; }
    .border-line-1.border-left { animation-delay: 9s; }
    .border-line-2.border-top { animation-delay: 6s; }
    .border-line-2.border-right { animation-delay: 9s; }
    .border-line-2.border-bottom { animation-delay: 0s; }
    .border-line-2.border-left { animation-delay: 3s; }

    @keyframes move-horizontal {
      0% { background-position: -100% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes move-horizontal-reverse {
      0% { background-position: 200% 0; }
      100% { background-position: -100% 0; }
    }

    @keyframes move-vertical {
      0% { background-position: 0 -100%; }
      100% { background-position: 0 200%; }
    }

    @keyframes move-vertical-reverse {
      0% { background-position: 0 200%; }
      100% { background-position: 0 -100%; }
    }

    @keyframes rampage-screen-shake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-2px, 1px); }
      50% { transform: translate(2px, -2px); }
      75% { transform: translate(-1px, 2px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes fire-flicker {
      0%, 100% { opacity: 0.8; filter: hue-rotate(0deg) saturate(1); }
      50% { opacity: 1; filter: hue-rotate(-6deg) saturate(1.3); }
    }

    .container {
      position: relative;
      z-index: 3;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
      position: relative;
      display: inline-block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .wave-text {
      background: linear-gradient(90deg,
          #4dd9d9 0%,
          #a8e6cf 35%,
          #9b59b6 50%,
          #a8e6cf 65%,
          #4dd9d9 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: wave-effect 6s linear infinite;
      text-shadow:
        0 0 20px rgba(77, 217, 217, 0.6),
        0 0 40px rgba(155, 89, 182, 0.4),
        0 0 60px rgba(168, 230, 207, 0.2);
      filter: drop-shadow(0 0 10px rgba(77, 217, 217, 0.5));
    }

    [data-theme="light"] .wave-text {
      background: linear-gradient(90deg,
          #3ca0a0 0%,
          #2d5a6b 35%,
          #8e44ad 50%,
          #2d5a6b 65%,
          #3ca0a0 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 0 20px rgba(60, 160, 160, 0.6),
        0 0 40px rgba(142, 68, 173, 0.4),
        0 0 60px rgba(45, 90, 107, 0.2);
      filter: drop-shadow(0 0 10px rgba(60, 160, 160, 0.5));
    }

    @keyframes wave-effect {
      0% { background-position: 200% 0; }
      100% { background-position: -100% 0; }
    }

    h1:active { transform: scale(0.98); }

    .title-gif {
      max-width: min(90vw, 520px);
      width: min(90vw, 520px);
      height: auto;
      display: block;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 10px rgba(255, 80, 0, 0.6));
    }

    .rampage-banner {
      display: none;
      margin-top: 1rem;
      font-size: clamp(1rem, 3.2vw, 2rem);
      line-height: 1.3;
      color: #ffd8b1;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255, 34, 34, 0.95),
        0 0 20px rgba(255, 94, 0, 0.75),
        3px 3px 0 rgba(40, 0, 0, 0.85);
      animation: fire-flicker 0.35s infinite;
    }

    body.rampage .rampage-banner {
      display: block;
    }

    p {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      font-family: 'Press Start 2P', monospace;
      font-weight: 400;
      opacity: 0.9;
      animation: subtle-pulse 12s ease-in-out infinite;
      letter-spacing: 0.05em;
      line-height: 1.4;
    }

    @keyframes subtle-pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1; }
    }

    .icons { margin-top: 1.5rem; }

    .click-counter {
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
    }

    .click-counter.show {
      opacity: 1;
      transform: translateY(0);
    }

    .click-counter p {
      font-size: 0.6rem;
      color: #4dd9d9;
      margin: 0;
      text-shadow: 0 0 10px rgba(77, 217, 217, 0.5);
      animation: none;
    }

    body.rampage .click-counter p {
      color: #ffd0b0;
      text-shadow: 0 0 10px rgba(255, 80, 0, 0.85);
    }

    [data-theme="light"] .click-counter p {
      color: #3ca0a0;
      text-shadow: 0 0 10px rgba(60, 160, 160, 0.5);
    }

    .icons a {
      margin: 0 10px;
      font-size: 1.5rem;
      color: inherit;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .icons a:hover {
      color: #4dd9d9;
      transform: scale(1.1);
    }

    body.rampage .icons a:hover {
      color: #ffb347;
      filter: drop-shadow(0 0 8px rgba(255, 68, 0, 0.7));
    }

    [data-theme="light"] .icons a:hover {
      color: #3ca0a0;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.5rem;
      color: #8899aa;
      z-index: 2;
      font-family: 'Press Start 2P', monospace;
      letter-spacing: 0.05em;
      line-height: 1.4;
    }

    footer a {
      color: #4dd9d9;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    footer a:hover { color: #9b59b6; }

    body.rampage footer,
    body.rampage footer a {
      color: #ffc9b3;
    }

    [data-theme="light"] footer { color: #5a7a8a; }
    [data-theme="light"] footer a { color: #3ca0a0; }
    [data-theme="light"] footer a:hover { color: #8e44ad; }

    .theme-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 5;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px;
      color: inherit;
      font-size: 1.2rem;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .theme-toggle:hover {
      background-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
    }

    [data-theme="light"] .theme-toggle {
      background: rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 0, 0, 0.2);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] .theme-toggle:hover {
      background-color: rgba(0, 0, 0, 0.2);
      box-shadow: 0 6px 25px rgba(255, 255, 255, 0.15);
    }

    .theme-icon { transition: all 0.3s ease; }
    .sun-icon { display: none; }
    .moon-icon { display: block; }
    [data-theme="light"] .sun-icon { display: block; }
    [data-theme="light"] .moon-icon { display: none; }

    .chaos-layer {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .chaos-cube {
      position: absolute;
      width: 90px;
      height: 90px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 10px rgba(255, 55, 0, 0.65));
      will-change: transform;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      p { font-size: 0.6rem; }
      .icons a {
        font-size: 1.3rem;
        margin: 0 8px;
      }
      footer { font-size: 0.4rem; }
      .chaos-cube {
        width: 72px;
        height: 72px;
      }
    }
  </style>
</head>

<body>
  <div class="border-segments">
    <div class="border-top border-line-1"></div>
    <div class="border-right border-line-1"></div>
    <div class="border-bottom border-line-1"></div>
    <div class="border-left border-line-1"></div>
    <div class="border-top border-line-2"></div>
    <div class="border-right border-line-2"></div>
    <div class="border-bottom border-line-2"></div>
    <div class="border-left border-line-2"></div>
  </div>

  <div id="chaosLayer" class="chaos-layer" aria-hidden="true"></div>

  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <i class="fas fa-sun theme-icon sun-icon"></i>
    <i class="fas fa-moon theme-icon moon-icon"></i>
  </button>

  <div class="container">
    <h1 id="username" class="wave-text" onclick="playClickSound()">Umilushi</h1>
    <div id="rampageBanner" class="rampage-banner">RAMPAGE TIME!!!</div>
    <p id="subtitle">ENVTuber!! doing vtuber things!</p>

    <div id="clickCounter" class="click-counter" style="display: none;">
      <p id="clickCounterText">Hey! You clicked me <span id="clickCount">0</span> times.</p>
    </div>

    <div class="icons">
      <a href="https://discord.gg/JBXtzpRUcF" title="Discord" target="_blank"><i class="fab fa-discord"></i></a>
      <a href="https://x.com/umilushi" title="X" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a href="https://www.youtube.com/channel/UCENdrTBnznipUlIYcRQenOA" title="YouTube" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://www.twitch.tv/umilushi" title="Twitch" target="_blank"><i class="fab fa-twitch"></i></a>
    </div>
  </div>

  <footer>
    Copyright © 2025–present Umilushi // OutOfTune <br>
    Heavily inspired by <a href="https://github.com/spectrapulse" target="_blank"> SpectraPulse</a>
  </footer>

  <audio id="backgroundAudio" preload="auto" loop>
    <source src="./bgm.flac" type="audio/flac">
    <source src="./bgm.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <audio id="rampageAudio" preload="auto" loop>
    <source src="./rampage-bgm.mp3" type="audio/mpeg">
    <source src="./rampage-bgm.ogg" type="audio/ogg">
  </audio>

  <audio id="clickSound" preload="auto">
    <source src="./click-sound.mp3" type="audio/mpeg">
    <source src="./click-sound.ogg" type="audio/ogg">
    Your browser does not support the audio element.
  </audio>

  <script>
    const RAMPAGE_THRESHOLD = 20;
    let clickCount = 0;
    let rampageTriggered = false;

    const audio = document.getElementById('backgroundAudio');
    const rampageAudio = document.getElementById('rampageAudio');
    const clickSound = document.getElementById('clickSound');
    const clickCounter = document.getElementById('clickCounter');
    const clickCountSpan = document.getElementById('clickCount');
    const clickCounterText = document.getElementById('clickCounterText');
    const username = document.getElementById('username');
    const subtitle = document.getElementById('subtitle');
    const chaosLayer = document.getElementById('chaosLayer');

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function playClickSound() {
      clickSound.currentTime = 0;
      clickSound.play().catch(error => {
        console.log('Click sound could not be played:', error);
      });

      clickCount++;
      clickCountSpan.textContent = clickCount;

      if (clickCount === 1) {
        clickCounter.style.display = 'block';
        setTimeout(() => clickCounter.classList.add('show'), 10);
      }

      if (!rampageTriggered && clickCount >= RAMPAGE_THRESHOLD) {
        triggerRampageMode();
      }
    }

    function triggerRampageMode() {
      rampageTriggered = true;
      document.body.classList.add('rampage');

      username.classList.remove('wave-text');
      username.innerHTML = '<img src="./cubeilushi.gif" alt="cubeilushi" class="title-gif">';
      username.setAttribute('aria-label', 'Rampage mode activated');

      subtitle.textContent = 'You clicked too much. You have unleashed the cube.';
      clickCounterText.innerHTML = 'Hey! You clicked me <span id="clickCount">' + clickCount + '</span> times. Now suffer.';
      spawnChaosCubes(10);
      switchToRampageBgm();
    }

    function spawnChaosCubes(amount) {
      const cubes = [];

      for (let i = 0; i < amount; i++) {
        const cube = document.createElement('img');
        const size = 58 + Math.random() * 70;
        const x = Math.random() * Math.max(1, window.innerWidth - size);
        const y = Math.random() * Math.max(1, window.innerHeight - size);
        const vx = (Math.random() * 5 + 2) * (Math.random() > 0.5 ? 1 : -1);
        const vy = (Math.random() * 5 + 2) * (Math.random() > 0.5 ? 1 : -1);
        const rotationSpeed = (Math.random() * 6) - 3;

        cube.src = './cubeilushiReal.gif';
        cube.className = 'chaos-cube';
        cube.style.width = size + 'px';
        cube.style.height = size + 'px';
        cube.style.left = x + 'px';
        cube.style.top = y + 'px';
        chaosLayer.appendChild(cube);

        cubes.push({ el: cube, x, y, vx, vy, size, angle: Math.random() * 360, rotationSpeed });
      }

      function animate() {
        const maxX = window.innerWidth;
        const maxY = window.innerHeight;

        cubes.forEach(cube => {
          cube.x += cube.vx;
          cube.y += cube.vy;
          cube.angle += cube.rotationSpeed;

          if (cube.x <= 0 || cube.x + cube.size >= maxX) {
            cube.vx *= -1;
            cube.x = Math.max(0, Math.min(cube.x, maxX - cube.size));
          }

          if (cube.y <= 0 || cube.y + cube.size >= maxY) {
            cube.vy *= -1;
            cube.y = Math.max(0, Math.min(cube.y, maxY - cube.size));
          }

          cube.el.style.transform = 'translate(' + cube.x + 'px, ' + cube.y + 'px) rotate(' + cube.angle + 'deg)';
          cube.el.style.left = '0px';
          cube.el.style.top = '0px';
        });

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    }

    function switchToRampageBgm() {
      audio.volume = 0.15;
      rampageAudio.volume = 0.45;

      const rampageAttempt = rampageAudio.play();
      if (rampageAttempt && typeof rampageAttempt.catch === 'function') {
        rampageAttempt.catch(error => {
          console.log('Rampage BGM could not be played, keeping normal BGM:', error);
          audio.playbackRate = 1.15;
          audio.volume = 0.45;
        });
      }
    }

    function startBackgroundAudio() {
      audio.play().catch(error => {
        console.log('Audio autoplay prevented:', error);
        document.addEventListener('click', function () {
          if (audio.paused) {
            audio.play().catch(err => console.log('Audio play failed:', err));
          }
        }, { once: true });
      });
    }

    audio.volume = 0.3;
    clickSound.volume = 0.5;

    window.addEventListener('load', () => {
      startBackgroundAudio();
    });

    document.addEventListener('click', function () {
      if (audio.paused) {
        startBackgroundAudio();
      }
    }, { once: true });
  </script>
</body>

</html>
