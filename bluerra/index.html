<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bluerra-Sai</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Hair palette — dark navy base, steel-blue mid, icy pale highlight */
      --bg-dark: #0e0f1c;
      --bg-light: #d6e8f5;
      --text-dark: #e8f4fb;
      --text-light: #0e1828;
      --pastel-blue: #89c4e1;
      --pastel-blue-light: #b8dff2;
      --pastel-blue-dark: #5a9abf;
      --border-color-dark: var(--pastel-blue);
      --border-color-light: var(--pastel-blue-dark);
      --glow-color-dark: rgba(137, 196, 225, 0.8);
      --glow-color-light: rgba(90, 154, 191, 0.8);
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-dark);
      transition: background-color 0.5s ease, color 0.5s ease;
      position: relative;
      background-image: url('./background.png');
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    [data-theme="light"] body {
      background-color: var(--bg-light);
      color: var(--text-light);
    }

    .page-shell,
    .container,
    .navigation-links,
    footer,
    .nav-link,
    .icons a {
      transition: color 0.45s ease, background-color 0.45s ease, box-shadow 0.45s ease, border-color 0.45s ease;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(14, 15, 28, 0.72);
      z-index: 0;
      pointer-events: none;
    }

    [data-theme="light"] body::before {
      background: rgba(214, 232, 245, 0.62);
    }

    #intro-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(12, 18, 30, 0.93);
      backdrop-filter: blur(14px);
      animation: intro-fade-out 1s ease-in-out forwards;
      animation-delay: 0.9s;
      overflow: hidden;
    }

    #intro-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center,
          rgba(168, 216, 234, 0.12) 0%,
          rgba(168, 216, 234, 0.04) 30%,
          rgba(12, 18, 30, 0) 65%);
      pointer-events: none;
    }

    .intro-logo {
      width: clamp(260px, 30vw, 420px);
      max-width: 82%;
      height: auto;
      opacity: 0;
      transform: translateY(8px) scale(0.9);
      image-rendering: auto;
      filter:
        drop-shadow(0 0 8px rgba(168, 216, 234, 0.75)) drop-shadow(0 0 18px rgba(168, 216, 234, 0.35));
      animation: intro-logo-in 0.9s ease-out forwards;
    }

    .page-shell {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: translateY(18px) scale(0.99);
      filter: blur(10px);
      animation: main-reveal 0.95s ease forwards;
      animation-delay: 1.05s;
    }

    .border-segments {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 1;
    }

    .border-top,
    .border-right,
    .border-bottom,
    .border-left {
      position: absolute;
    }

    .border-top,
    .border-right,
    .border-bottom,
    .border-left {
      position: absolute;
      box-shadow: 0 0 10px var(--glow-color-dark);
      animation: border-glow 4.5s ease-in-out infinite;
    }

    .border-top {
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .border-right {
      top: 0;
      right: 0;
      bottom: 0;
      width: 3px;
    }

    .border-bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .border-left {
      top: 0;
      left: 0;
      bottom: 0;
      width: 3px;
    }

    /* The glowing beams */
    .border-top::after,
    .border-right::after,
    .border-bottom::after,
    .border-left::after {
      content: '';
      position: absolute;
      will-change: transform, opacity;
      border-radius: 4px;
      opacity: 0;
    }

    /* Horizontal sizes & animations */
    .border-top::after,
    .border-bottom::after {
      top: -1px;
      bottom: -1px;
      /* Slightly thicker for shine */
      width: 15vw;
    }

    .border-top::after {
      left: 0;
      background: linear-gradient(90deg, transparent, var(--pastel-blue), var(--pastel-blue-light), var(--pastel-blue), transparent);
      animation: snake-ltr 12s linear infinite;
    }

    .border-bottom::after {
      right: 0;
      background: linear-gradient(270deg, transparent, var(--pastel-blue), var(--pastel-blue-light), var(--pastel-blue), transparent);
      animation: snake-rtl 12s linear infinite;
    }

    /* Vertical sizes & animations */
    .border-right::after,
    .border-left::after {
      left: -1px;
      right: -1px;
      height: 15vh;
    }

    .border-right::after {
      top: 0;
      background: linear-gradient(180deg, transparent, var(--pastel-blue), var(--pastel-blue-light), var(--pastel-blue), transparent);
      animation: snake-ttb 12s linear infinite;
    }

    .border-left::after {
      bottom: 0;
      background: linear-gradient(0deg, transparent, var(--pastel-blue), var(--pastel-blue-light), var(--pastel-blue), transparent);
      animation: snake-btt 12s linear infinite;
    }

    /* Light Theme overrides */
    [data-theme="light"] .border-top,
    [data-theme="light"] .border-right,
    [data-theme="light"] .border-bottom,
    [data-theme="light"] .border-left {
      box-shadow: 0 0 10px var(--glow-color-light);
    }

    [data-theme="light"] .border-top::after {
      background: linear-gradient(90deg, transparent, var(--pastel-blue-dark), var(--pastel-blue), var(--pastel-blue-dark), transparent);
    }

    [data-theme="light"] .border-right::after {
      background: linear-gradient(180deg, transparent, var(--pastel-blue-dark), var(--pastel-blue), var(--pastel-blue-dark), transparent);
    }

    [data-theme="light"] .border-bottom::after {
      background: linear-gradient(270deg, transparent, var(--pastel-blue-dark), var(--pastel-blue), var(--pastel-blue-dark), transparent);
    }

    [data-theme="light"] .border-left::after {
      background: linear-gradient(0deg, transparent, var(--pastel-blue-dark), var(--pastel-blue), var(--pastel-blue-dark), transparent);
    }

    /* Assign identical continuous routing delays to the snake pseudo elements */
    .border-line-1.border-top::after {
      animation-delay: 0s;
    }

    .border-line-1.border-right::after {
      animation-delay: 3s;
    }

    .border-line-1.border-bottom::after {
      animation-delay: 6s;
    }

    .border-line-1.border-left::after {
      animation-delay: 9s;
    }

    .border-line-2.border-top::after {
      animation-delay: 6s;
    }

    .border-line-2.border-right::after {
      animation-delay: 9s;
    }

    .border-line-2.border-bottom::after {
      animation-delay: 0s;
    }

    .border-line-2.border-left::after {
      animation-delay: 3s;
    }

    @keyframes snake-ltr {
      0% {
        transform: translateX(-15vw);
        opacity: 1;
      }

      25% {
        transform: translateX(100vw);
        opacity: 1;
      }

      25.01%,
      100% {
        transform: translateX(100vw);
        opacity: 0;
      }
    }

    @keyframes snake-ttb {
      0% {
        transform: translateY(-15vh);
        opacity: 1;
      }

      25% {
        transform: translateY(100vh);
        opacity: 1;
      }

      25.01%,
      100% {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    @keyframes snake-rtl {
      0% {
        transform: translateX(15vw);
        opacity: 1;
      }

      25% {
        transform: translateX(-100vw);
        opacity: 1;
      }

      25.01%,
      100% {
        transform: translateX(-100vw);
        opacity: 0;
      }
    }

    @keyframes snake-btt {
      0% {
        transform: translateY(15vh);
        opacity: 1;
      }

      25% {
        transform: translateY(-100vh);
        opacity: 1;
      }

      25.01%,
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }

    @keyframes border-glow {

      0%,
      100% {
        opacity: 0.75;
        filter: drop-shadow(0 0 10px rgba(137, 196, 225, 0.75));
      }

      50% {
        opacity: 1;
        filter: drop-shadow(0 0 18px rgba(168, 216, 234, 0.9));
      }
    }

    @keyframes intro-logo-in {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.9);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes intro-glitch {

      0%,
      100% {
        transform: translateX(0) translateY(0) skewX(0deg);
        opacity: 1;
      }

      20% {
        transform: translateX(-3px) translateY(1px) skewX(-0.8deg);
        opacity: 0.95;
      }

      40% {
        transform: translateX(2px) translateY(-2px) skewX(0.6deg);
        opacity: 0.98;
      }

      60% {
        transform: translateX(-1px) translateY(2px) skewX(-0.3deg);
      }

      80% {
        transform: translateX(1px) translateY(-1px) skewX(0.2deg);
      }
    }

    @keyframes intro-fade-out {
      to {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    }

    @keyframes main-reveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .container {
      position: relative;
      top: -4vh;
      /* Slightly upper alignment */
      z-index: 3;
      height: 100%;
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 32px;
    }

    .logo {
      width: clamp(460px, 36vw, 620px);
      max-width: 92%;
      height: auto;
      cursor: pointer;
      user-select: none;
      image-rendering: auto;
      animation: logo-float 6s ease-in-out infinite;
      transition: transform 0.25s ease, filter 0.25s ease;
      filter:
        drop-shadow(0 0 6px rgba(168, 216, 234, 0.65)) drop-shadow(0 0 14px rgba(168, 216, 234, 0.35));
    }

    .logo:hover {
      transform: scale(1.03);
      filter:
        drop-shadow(0 0 8px rgba(168, 216, 234, 0.8)) drop-shadow(0 0 18px rgba(168, 216, 234, 0.45));
    }

    .logo:active {
      transform: scale(0.99);
    }

    [data-theme="light"] .logo {
      filter:
        drop-shadow(0 0 6px rgba(127, 179, 211, 0.55)) drop-shadow(0 0 14px rgba(127, 179, 211, 0.25));
    }

    [data-theme="light"] .logo:hover {
      filter:
        drop-shadow(0 0 8px rgba(127, 179, 211, 0.7)) drop-shadow(0 0 18px rgba(127, 179, 211, 0.35));
    }

    @keyframes logo-float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    p {
      margin-top: 0;
      font-size: 0.9rem;
      font-family: 'Press Start 2P', cursive;
      font-weight: 400;
      opacity: 0.92;
      animation: subtle-pulse 12s ease-in-out infinite;
      line-height: 1.7;
      text-shadow: 0 0 10px var(--glow-color-dark);
    }

    [data-theme="light"] p {
      text-shadow: 0 0 10px var(--glow-color-light);
    }

    @keyframes subtle-pulse {

      0%,
      100% {
        opacity: 0.9;
      }

      50% {
        opacity: 1;
      }
    }

    .easter-egg-message {
      margin-top: 1rem;
      font-size: 0.8rem;
      font-family: 'Press Start 2P', cursive;
      font-weight: 400;
      opacity: 0.9;
      line-height: 1.6;
      text-shadow: 0 0 10px var(--glow-color-dark);
      color: var(--text-dark);
      transition: color 0.5s ease, text-shadow 0.5s ease;
    }

    [data-theme="light"] .easter-egg-message {
      text-shadow: 0 0 10px var(--glow-color-light);
      color: var(--text-light);
    }

    .easter-egg-message.warning {
      color: #ff4444;
      text-shadow:
        0 0 15px rgba(255, 68, 68, 0.8),
        0 0 25px rgba(255, 68, 68, 0.6),
        0 0 35px rgba(255, 68, 68, 0.4);
      animation: warning-pulse 2s ease-in-out infinite;
    }

    @keyframes warning-pulse {

      0%,
      100% {
        opacity: 0.9;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.02);
      }
    }

    @keyframes theme-toggle-pulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 4px 20px rgba(137, 196, 225, 0.8);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 8px 30px rgba(168, 216, 234, 0.9);
      }
    }

    .theme-icon {
      transition: transform 0.25s ease, text-shadow 0.25s ease;
      text-shadow: 0 0 8px var(--glow-color-dark);
    }

    [data-theme="light"] .theme-icon {
      text-shadow: 0 0 8px var(--glow-color-light);
      color: #000f1b;
    }

    .theme-toggle:hover .theme-icon {
      transform: scale(1.1);
    }

    .navigation-links {
      margin-top: 1.5rem;
      margin-bottom: 1rem;
    }

    .navigation-links p {
      margin: 0.8rem 0;
      font-size: 0.8rem;
      line-height: 1.5;
      text-shadow: 0 0 8px var(--glow-color-dark);
    }

    [data-theme="light"] .navigation-links p {
      text-shadow: 0 0 8px var(--glow-color-light);
    }

    .nav-link {
      color: var(--pastel-blue-light);
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      text-shadow: 0 0 10px var(--glow-color-dark);
      border-bottom: 1px dotted var(--pastel-blue);
      padding-bottom: 1px;
    }

    [data-theme="light"] .nav-link {
      color: var(--pastel-blue-dark);
      text-shadow: 0 0 10px var(--glow-color-light);
      border-bottom: 1px dotted var(--pastel-blue-dark);
    }

    .nav-link:hover {
      color: var(--pastel-blue);
      text-shadow:
        0 0 15px var(--glow-color-dark),
        0 0 25px var(--glow-color-dark);
      transform: scale(1.05);
      border-bottom: 1px solid var(--pastel-blue);
    }

    [data-theme="light"] .nav-link:hover {
      color: var(--pastel-blue);
      text-shadow:
        0 0 15px var(--glow-color-light),
        0 0 25px var(--glow-color-light);
      border-bottom: 1px solid var(--pastel-blue);
    }

    .icons {
      margin-top: 1.5rem;
    }

    .icons a {
      margin: 0 15px;
      font-size: 1.8rem;
      color: inherit;
      text-decoration: none;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px var(--glow-color-dark));
      opacity: 0.82;
    }

    [data-theme="light"] .icons a {
      filter: drop-shadow(0 0 8px var(--glow-color-light));
    }

    .icons a:hover {
      color: var(--pastel-blue);
      opacity: 1;
      transform: scale(1.16);
      filter: drop-shadow(0 0 15px var(--glow-color-dark));
    }

    [data-theme="light"] .icons a:hover {
      color: var(--pastel-blue-dark);
      filter: drop-shadow(0 0 15px var(--glow-color-light));
    }

    footer {
      position: fixed;
      bottom: 15px;
      width: 100%;
      text-align: center;
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.7);
      z-index: 2;
      font-family: 'Press Start 2P', cursive;
      line-height: 1.4;
      padding: 0 20px;
    }

    [data-theme="light"] footer {
      color: rgba(26, 35, 50, 0.7);
    }

    footer a {
      color: var(--pastel-blue);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: var(--pastel-blue-light);
    }

    [data-theme="light"] footer a {
      color: var(--pastel-blue-dark);
    }

    [data-theme="light"] footer a:hover {
      color: var(--pastel-blue);
    }

    /* --- FIXING THE THUMB ALIGNMENT --- */
    .theme-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 5;
      background: rgba(168, 216, 234, 0.18);
      backdrop-filter: blur(10px);
      border: 2px solid var(--pastel-blue);
      padding: 0;
      color: #ffffff;
      font-size: 1rem;
      border-radius: 999px;
      cursor: pointer;
      width: 86px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 22px var(--glow-color-dark);
      animation: theme-toggle-pulse 4s ease-in-out infinite;
      image-rendering: pixelated;
      overflow: hidden;
      position: relative;
      transition: background-color 0.45s ease, border-color 0.45s ease, box-shadow 0.45s ease;
      box-sizing: border-box;
      /* Ensures the border doesn't mess with our math */
    }

    .theme-toggle::before {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      top: 1px;
      /* Changed from 3px to center it perfectly vertically */
      left: 1px;
      /* Changed from 3px to center it perfectly horizontally */
      background: var(--bg-dark);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1), background 0.3s ease;
      z-index: 1;
    }

    .theme-toggle:hover {
      background-color: rgba(168, 216, 234, 0.3);
      transform: scale(1.03);
      box-shadow: 0 8px 28px var(--glow-color-dark);
    }

    [data-theme="light"] .theme-toggle {
      background: rgba(214, 232, 245, 0.4);
      border: 2px solid var(--pastel-blue-dark);
      box-shadow: 0 4px 20px var(--glow-color-light);
      color: #112136;
    }

    [data-theme="light"] .theme-toggle::before {
      transform: translateX(50px);
      background: var(--bg-light);
    }

    [data-theme="light"] .theme-toggle:hover {
      background-color: rgba(127, 179, 211, 0.24);
      box-shadow: 0 8px 28px var(--glow-color-light);
      transform: scale(1.03);
    }

    .theme-icon {
      position: absolute;
      z-index: 2;
      transition: transform 0.25s ease, opacity 0.25s ease;
      font-size: 0.95rem;
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.65);
    }

    /* --- FIXING THE ICON CONTRAST/OPACITY --- */
    .sun-icon {
      left: 8px;
      opacity: 1;
      /* Bright inside the dark thumb */
      color: #ffffff;
      transform: translateX(0);
    }

    .moon-icon {
      right: 8px;
      opacity: 0.5;
      /* Dimmed outside the thumb */
      transform: translateX(0);
    }

    [data-theme="light"] .sun-icon {
      opacity: 0.5;
      /* Dimmed outside the thumb */
      color: inherit;
      transform: translateX(0);
    }

    [data-theme="light"] .moon-icon {
      opacity: 1;
      /* Bright inside the light thumb */
      color: #112136;
      /* Dark color to contrast against the light thumb */
      transform: translateX(0);
    }

    /* --- NOW PLAYING WIDGET --- */
    .now-playing {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      /* Removed all background, border, padding, and shadow properties */
    }

    /* Note: You can completely delete the [data-theme="light"] .now-playing block 
       since there is no longer a box to theme! */

    .visualizer {
      display: flex;
      align-items: flex-end;
      height: 14px;
      gap: 3px;
    }

    .bar {
      width: 3px;
      background-color: var(--pastel-blue);
      border-radius: 2px;
      animation: bounce 1s ease-in-out infinite;
      box-shadow: 0 0 5px var(--glow-color-dark);
      transform-origin: bottom;
    }

    [data-theme="light"] .bar {
      background-color: var(--pastel-blue-dark);
      box-shadow: 0 0 5px var(--glow-color-light);
    }

    /* Stagger the animation heights and delays */
    .bar:nth-child(1) {
      height: 100%;
      animation-delay: 0.0s;
    }

    .bar:nth-child(2) {
      height: 60%;
      animation-delay: 0.2s;
    }

    .bar:nth-child(3) {
      height: 80%;
      animation-delay: 0.4s;
    }

    .bar:nth-child(4) {
      height: 40%;
      animation-delay: 0.1s;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: scaleY(0.4);
      }

      50% {
        transform: scaleY(1);
      }
    }

    .song-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.55rem;
      color: var(--text-dark);
      text-shadow: 0 0 8px var(--glow-color-dark);
      white-space: nowrap;
      line-height: 1.2;
      /* Removed max-width, overflow, and ellipsis properties to show the full name */
    }

    [data-theme="light"] .song-title {
      color: var(--text-light);
      text-shadow: 0 0 8px var(--glow-color-light);
    }

    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }

      .logo {
        width: 320px;
      }

      .logo-wrapper {
        margin-bottom: 24px;
      }

      p {
        font-size: 0.7rem;
        margin-top: 0;
      }

      .icons a {
        font-size: 1.5rem;
        margin: 0 10px;
      }

      .navigation-links p {
        font-size: 0.65rem;
        margin: 0.6rem 0;
      }

      footer {
        font-size: 0.5rem;
        bottom: 10px;
      }

      .theme-toggle {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }

      .now-playing {
        bottom: 45px;
        left: 50%;
        transform: translateX(-50%);
        width: max-content;
      }

      .song-title {
        font-size: 0.45rem;
        /* Removed max-width */
      }

    }
  </style>
</head>

<body>
  <div id="intro-screen" aria-hidden="true">
    <img src="./logo.png" alt="Bluerra-Sai intro logo" class="intro-logo">
  </div>

  <div class="page-shell">
    <div class="border-segments">
      <div class="border-top border-line-1"></div>
      <div class="border-right border-line-1"></div>
      <div class="border-bottom border-line-1"></div>
      <div class="border-left border-line-1"></div>
      <div class="border-top border-line-2"></div>
      <div class="border-right border-line-2"></div>
      <div class="border-bottom border-line-2"></div>
      <div class="border-left border-line-2"></div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <i class="fas fa-sun theme-icon sun-icon"></i>
      <i class="fas fa-moon theme-icon moon-icon"></i>
    </button>

    <div class="container">
      <div class="logo-wrapper">
        <img src="./logo.png" id="username" class="logo" onclick="handleNameClick()" alt="Bluerra-Sai Logo">
      </div>

      <p id="description">Visual artist and Musician.</p>
      <p id="easter-egg-text" class="easter-egg-message" style="display: none;">boop</p>

      <div class="navigation-links"></div>

      <div class="icons">
        <a href="https://discord.gg/Fxb2czS6v4" title="Discord" target="_blank"><i class="fab fa-discord"></i></a>
        <a href="https://open.spotify.com/artist/3WciAVM3DxjIWwV3aSugVa?si=S43FoBBCRRi9NMNqg-lYdA" title="Spotify"
          target="_blank"><i class="fab fa-spotify"></i></a>
        <a href="https://www.tiktok.com/@bluerra" title="TikTok" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://twitch.tv/bluerra_sai" title="Twitch" target="_blank"><i class="fab fa-twitch"></i></a>
        <a href="https://x.com/BluerraSAI" title="X / Twitter" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a href="https://trello.com/b/g332ctkw/bluerrasai-projects" title="Trello (Projects)" target="_blank"><i
            class="fab fa-trello"></i></a>
      </div>
    </div>

    <footer>
      Copyright © 2025–present Bluerra-Sai // OutOfTune <br>
      Heavily inspired by <a href="https://spectrapulse.github.io" target="_blank"
        rel="noopener noreferrer">SpectraPulse</a>
    </footer>

    <div class="now-playing">
      <div class="visualizer">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <span class="song-title">desert sand feels warm at night - 私は私です</span>
    </div>

    <footer>

  </div>

  <audio id="backgroundAudio" preload="auto" loop>
    <source src="./bgm.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <audio id="clickSound" preload="auto">
    <source src="./click-sound.mp3" type="audio/mpeg">
    <source src="./click-sound.ogg" type="audio/ogg">
    Your browser does not support the audio element.
  </audio>

  <script>
    let nameClickCount = 0;
    const maxClicks = 5;

    function handleNameClick() {
      nameClickCount++;
      playClickSound();

      const descriptionEl = document.getElementById('description');
      const easterEggEl = document.getElementById('easter-egg-text');

      if (nameClickCount === 1) {
        descriptionEl.style.display = 'none';
        easterEggEl.style.display = 'block';
        easterEggEl.textContent = 'boop!';
        easterEggEl.classList.remove('warning');
      } else if (nameClickCount >= maxClicks) {
        easterEggEl.textContent = 'Okay buddy, that\'s enough!';
        easterEggEl.classList.add('warning');
      }

      setTimeout(() => {
        if (nameClickCount < maxClicks) {
          nameClickCount = 0;
          descriptionEl.style.display = 'block';
          easterEggEl.style.display = 'none';
          easterEggEl.classList.remove('warning');
        }
      }, 3000);
    }

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute("data-theme");
      html.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }

    function playClickSound() {
      const clickSound = document.getElementById('clickSound');
      clickSound.currentTime = 0;
      clickSound.play().catch(error => {
        console.log('Click sound could not be played:', error);
      });
    }

    const audio = document.getElementById('backgroundAudio');

    function startBackgroundAudio() {
      audio.play().catch(error => {
        console.log('Audio autoplay prevented:', error);
        document.addEventListener('click', function () {
          if (audio.paused) {
            audio.play().catch(err => console.log('Audio play failed:', err));
          }
        }, { once: true });
      });
    }

    audio.volume = 0.15;
    const clickSound = document.getElementById('clickSound');
    clickSound.volume = 0.3;

    window.addEventListener('load', () => {
      startBackgroundAudio();
      setTimeout(() => {
        const intro = document.getElementById('intro-screen');
        if (intro) {
          intro.setAttribute('aria-hidden', 'true');
        }
      }, 2300);
    });

    document.addEventListener('click', function () {
      if (audio.paused) {
        startBackgroundAudio();
      }
    }, { once: true });
  </script>
</body>

</html>
