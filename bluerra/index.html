<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bluerra-Sai</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a2332;
      --bg-light: #e8f4f8;
      --text-dark: #ffffff;
      --text-light: #1a2332;
      --pastel-blue: #a8d8ea;
      --pastel-blue-light: #c7e9f5;
      --pastel-blue-dark: #7fb3d3;
      --border-color-dark: var(--pastel-blue);
      --border-color-light: var(--pastel-blue-dark);
      --glow-color-dark: rgba(168, 216, 234, 0.8);
      --glow-color-light: rgba(127, 179, 211, 0.8);
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-dark);
      transition: background 0.4s ease, color 0.4s ease;
      position: relative;
      background-image: url('./background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 35, 50, 0.72);
      z-index: 0;
      pointer-events: none;
    }

    [data-theme="light"] body {
      background-color: var(--bg-light);
      color: var(--text-light);
    }

    [data-theme="light"] body::before {
      background: rgba(232, 244, 248, 0.6);
    }

    #intro-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(12, 18, 30, 0.95);
      backdrop-filter: blur(10px);
      animation: intro-fade-out 0.8s ease forwards;
      animation-delay: 1.5s;
      overflow: hidden;
    }

    #intro-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center,
          rgba(168, 216, 234, 0.12) 0%,
          rgba(168, 216, 234, 0.04) 30%,
          rgba(12, 18, 30, 0) 65%);
      pointer-events: none;
    }

    .intro-logo {
      width: clamp(260px, 30vw, 420px);
      max-width: 82%;
      height: auto;
      opacity: 0;
      transform: translateY(10px) scale(0.96);
      image-rendering: auto;
      filter:
        drop-shadow(0 0 8px rgba(168, 216, 234, 0.75)) drop-shadow(0 0 18px rgba(168, 216, 234, 0.35));
      animation: intro-logo-in 0.9s ease forwards;
    }

    .page-shell {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: translateY(18px) scale(0.99);
      filter: blur(10px);
      animation: main-reveal 0.95s ease forwards;
      animation-delay: 1.05s;
    }

    .border-segments {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 1;
    }

    .border-top,
    .border-right,
    .border-bottom,
    .border-left {
      position: absolute;
    }

    .border-top {
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg,
          transparent 0%,
          transparent 30%,
          var(--pastel-blue) 40%,
          var(--pastel-blue-light) 50%,
          var(--pastel-blue) 60%,
          transparent 70%,
          transparent 100%);
      background-size: 300% 100%;
      animation: move-horizontal 12s linear infinite;
      box-shadow: 0 0 10px var(--glow-color-dark);
    }

    .border-right {
      top: 0;
      right: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg,
          transparent 0%,
          transparent 30%,
          var(--pastel-blue) 40%,
          var(--pastel-blue-light) 50%,
          var(--pastel-blue) 60%,
          transparent 70%,
          transparent 100%);
      background-size: 100% 300%;
      animation: move-vertical 12s linear infinite;
      box-shadow: 0 0 10px var(--glow-color-dark);
    }

    .border-bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(-90deg,
          transparent 0%,
          transparent 30%,
          var(--pastel-blue) 40%,
          var(--pastel-blue-light) 50%,
          var(--pastel-blue) 60%,
          transparent 70%,
          transparent 100%);
      background-size: 300% 100%;
      animation: move-horizontal-reverse 12s linear infinite;
      box-shadow: 0 0 10px var(--glow-color-dark);
    }

    .border-left {
      top: 0;
      left: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(-180deg,
          transparent 0%,
          transparent 30%,
          var(--pastel-blue) 40%,
          var(--pastel-blue-light) 50%,
          var(--pastel-blue) 60%,
          transparent 70%,
          transparent 100%);
      background-size: 100% 300%;
      animation: move-vertical-reverse 12s linear infinite;
      box-shadow: 0 0 10px var(--glow-color-dark);
    }

    [data-theme="light"] .border-top {
      background: linear-gradient(90deg,
          transparent 0%,
          transparent 30%,
          var(--pastel-blue-dark) 40%,
          var(--pastel-blue) 50%,
          var(--pastel-blue-dark) 60%,
          transparent 70%,
          transparent 100%) !important;
      box-shadow: 0 0 10px var(--glow-color-light) !important;
    }

    [data-theme="light"] .border-right {
      background: linear-gradient(180deg,
          transparent 0%,
          transparent 30%,
          var(--pastel-blue-dark) 40%,
          var(--pastel-blue) 50%,
          var(--pastel-blue-dark) 60%,
          transparent 70%,
          transparent 100%) !important;
      box-shadow: 0 0 10px var(--glow-color-light) !important;
    }

    [data-theme="light"] .border-bottom {
      background: linear-gradient(-90deg,
          transparent 0%,
          transparent 30%,
          var(--pastel-blue-dark) 40%,
          var(--pastel-blue) 50%,
          var(--pastel-blue-dark) 60%,
          transparent 70%,
          transparent 100%) !important;
      box-shadow: 0 0 10px var(--glow-color-light) !important;
    }

    [data-theme="light"] .border-left {
      background: linear-gradient(-180deg,
          transparent 0%,
          transparent 30%,
          var(--pastel-blue-dark) 40%,
          var(--pastel-blue) 50%,
          var(--pastel-blue-dark) 60%,
          transparent 70%,
          transparent 100%) !important;
      box-shadow: 0 0 10px var(--glow-color-light) !important;
    }

    .border-line-1.border-top {
      animation-delay: 0s;
    }

    .border-line-1.border-right {
      animation-delay: 3s;
    }

    .border-line-1.border-bottom {
      animation-delay: 6s;
    }

    .border-line-1.border-left {
      animation-delay: 9s;
    }

    .border-line-2.border-top {
      animation-delay: 6s;
    }

    .border-line-2.border-right {
      animation-delay: 9s;
    }

    .border-line-2.border-bottom {
      animation-delay: 0s;
    }

    .border-line-2.border-left {
      animation-delay: 3s;
    }

    @keyframes move-horizontal {
      0% {
        background-position: -100% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes move-horizontal-reverse {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -100% 0;
      }
    }

    @keyframes move-vertical {
      0% {
        background-position: 0 -100%;
      }

      100% {
        background-position: 0 200%;
      }
    }

    @keyframes move-vertical-reverse {
      0% {
        background-position: 0 200%;
      }

      100% {
        background-position: 0 -100%;
      }
    }

    @keyframes intro-logo-in {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes intro-fade-out {
      to {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    }

    @keyframes main-reveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .container {
      position: relative;
      z-index: 3;
      height: 100%;
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 32px;
    }

    .logo {
      width: clamp(460px, 36vw, 620px);
      max-width: 92%;
      height: auto;
      cursor: pointer;
      user-select: none;
      image-rendering: auto;
      animation: logo-float 6s ease-in-out infinite;
      transition: transform 0.25s ease, filter 0.25s ease;
      filter:
        drop-shadow(0 0 6px rgba(168, 216, 234, 0.65)) drop-shadow(0 0 14px rgba(168, 216, 234, 0.35));
    }

    .logo:hover {
      transform: scale(1.03);
      filter:
        drop-shadow(0 0 8px rgba(168, 216, 234, 0.8)) drop-shadow(0 0 18px rgba(168, 216, 234, 0.45));
    }

    .logo:active {
      transform: scale(0.99);
    }

    [data-theme="light"] .logo {
      filter:
        drop-shadow(0 0 6px rgba(127, 179, 211, 0.55)) drop-shadow(0 0 14px rgba(127, 179, 211, 0.25));
    }

    [data-theme="light"] .logo:hover {
      filter:
        drop-shadow(0 0 8px rgba(127, 179, 211, 0.7)) drop-shadow(0 0 18px rgba(127, 179, 211, 0.35));
    }

    @keyframes logo-float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    p {
      margin-top: 0;
      font-size: 0.9rem;
      font-family: 'Press Start 2P', cursive;
      font-weight: 400;
      opacity: 0.92;
      animation: subtle-pulse 12s ease-in-out infinite;
      line-height: 1.7;
      text-shadow: 0 0 10px var(--glow-color-dark);
    }

    [data-theme="light"] p {
      text-shadow: 0 0 10px var(--glow-color-light);
    }

    @keyframes subtle-pulse {

      0%,
      100% {
        opacity: 0.9;
      }

      50% {
        opacity: 1;
      }
    }

    .easter-egg-message {
      margin-top: 1rem;
      font-size: 0.8rem;
      font-family: 'Press Start 2P', cursive;
      font-weight: 400;
      opacity: 0.9;
      line-height: 1.6;
      text-shadow: 0 0 10px var(--glow-color-dark);
      color: var(--text-dark);
      transition: color 0.5s ease, text-shadow 0.5s ease;
    }

    [data-theme="light"] .easter-egg-message {
      text-shadow: 0 0 10px var(--glow-color-light);
      color: var(--text-light);
    }

    .easter-egg-message.warning {
      color: #ff4444;
      text-shadow:
        0 0 15px rgba(255, 68, 68, 0.8),
        0 0 25px rgba(255, 68, 68, 0.6),
        0 0 35px rgba(255, 68, 68, 0.4);
      animation: warning-pulse 2s ease-in-out infinite;
    }

    @keyframes warning-pulse {

      0%,
      100% {
        opacity: 0.9;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.02);
      }
    }

    .navigation-links {
      margin-top: 1.5rem;
      margin-bottom: 1rem;
    }

    .navigation-links p {
      margin: 0.8rem 0;
      font-size: 0.8rem;
      line-height: 1.5;
      text-shadow: 0 0 8px var(--glow-color-dark);
    }

    [data-theme="light"] .navigation-links p {
      text-shadow: 0 0 8px var(--glow-color-light);
    }

    .nav-link {
      color: var(--pastel-blue-light);
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      text-shadow: 0 0 10px var(--glow-color-dark);
      border-bottom: 1px dotted var(--pastel-blue);
      padding-bottom: 1px;
    }

    [data-theme="light"] .nav-link {
      color: var(--pastel-blue-dark);
      text-shadow: 0 0 10px var(--glow-color-light);
      border-bottom: 1px dotted var(--pastel-blue-dark);
    }

    .nav-link:hover {
      color: var(--pastel-blue);
      text-shadow:
        0 0 15px var(--glow-color-dark),
        0 0 25px var(--glow-color-dark);
      transform: scale(1.05);
      border-bottom: 1px solid var(--pastel-blue);
    }

    [data-theme="light"] .nav-link:hover {
      color: var(--pastel-blue);
      text-shadow:
        0 0 15px var(--glow-color-light),
        0 0 25px var(--glow-color-light);
      border-bottom: 1px solid var(--pastel-blue);
    }

    .icons {
      margin-top: 1.5rem;
    }

    .icons a {
      margin: 0 15px;
      font-size: 1.8rem;
      color: inherit;
      text-decoration: none;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px var(--glow-color-dark));
      opacity: 0.82;
    }

    [data-theme="light"] .icons a {
      filter: drop-shadow(0 0 8px var(--glow-color-light));
    }

    .icons a:hover {
      color: var(--pastel-blue);
      opacity: 1;
      transform: scale(1.16);
      filter: drop-shadow(0 0 15px var(--glow-color-dark));
    }

    [data-theme="light"] .icons a:hover {
      color: var(--pastel-blue-dark);
      filter: drop-shadow(0 0 15px var(--glow-color-light));
    }

    footer {
      position: fixed;
      bottom: 15px;
      width: 100%;
      text-align: center;
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.7);
      z-index: 2;
      font-family: 'Press Start 2P', cursive;
      line-height: 1.4;
      padding: 0 20px;
    }

    [data-theme="light"] footer {
      color: rgba(26, 35, 50, 0.7);
    }

    footer a {
      color: var(--pastel-blue);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: var(--pastel-blue-light);
    }

    [data-theme="light"] footer a {
      color: var(--pastel-blue-dark);
    }

    [data-theme="light"] footer a:hover {
      color: var(--pastel-blue);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 5;
      background: rgba(168, 216, 234, 0.2);
      backdrop-filter: blur(10px);
      border: 2px solid var(--pastel-blue);
      padding: 12px;
      color: inherit;
      font-size: 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px var(--glow-color-dark);
      image-rendering: pixelated;
    }

    .theme-toggle:hover {
      background-color: rgba(168, 216, 234, 0.4);
      transform: scale(1.1);
      box-shadow: 0 6px 25px var(--glow-color-dark);
    }

    [data-theme="light"] .theme-toggle {
      background: rgba(127, 179, 211, 0.2);
      border: 2px solid var(--pastel-blue-dark);
      box-shadow: 0 4px 20px var(--glow-color-light);
    }

    [data-theme="light"] .theme-toggle:hover {
      background-color: rgba(127, 179, 211, 0.4);
      box-shadow: 0 6px 25px var(--glow-color-light);
    }

    .theme-icon {
      transition: all 0.3s ease;
    }

    .sun-icon {
      display: none;
    }

    .moon-icon {
      display: block;
    }

    [data-theme="light"] .sun-icon {
      display: block;
    }

    [data-theme="light"] .moon-icon {
      display: none;
    }

    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }

      .logo {
        width: 320px;
      }

      .logo-wrapper {
        margin-bottom: 24px;
      }

      p {
        font-size: 0.7rem;
        margin-top: 0;
      }

      .icons a {
        font-size: 1.5rem;
        margin: 0 10px;
      }

      .navigation-links p {
        font-size: 0.65rem;
        margin: 0.6rem 0;
      }

      footer {
        font-size: 0.5rem;
        bottom: 10px;
      }

      .theme-toggle {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div id="intro-screen" aria-hidden="true">
    <img src="./logo.png" alt="Bluerra-Sai intro logo" class="intro-logo">
  </div>

  <div class="page-shell">
    <div class="border-segments">
      <div class="border-top border-line-1"></div>
      <div class="border-right border-line-1"></div>
      <div class="border-bottom border-line-1"></div>
      <div class="border-left border-line-1"></div>
      <div class="border-top border-line-2"></div>
      <div class="border-right border-line-2"></div>
      <div class="border-bottom border-line-2"></div>
      <div class="border-left border-line-2"></div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <i class="fas fa-sun theme-icon sun-icon"></i>
      <i class="fas fa-moon theme-icon moon-icon"></i>
    </button>

    <div class="container">
      <div class="logo-wrapper">
        <img src="./logo.png" id="username" class="logo" onclick="handleNameClick()" alt="Bluerra-Sai Logo">
      </div>

      <p id="description">Visual artist and Musician.</p>
      <p id="easter-egg-text" class="easter-egg-message" style="display: none;">boop</p>

      <div class="navigation-links"></div>

      <div class="icons">
        <a href="https://discord.com/users/1027154532070850622/" title="Discord" target="_blank"><i
            class="fab fa-discord"></i></a>
        <a href="https://open.spotify.com/artist/3WciAVM3DxjIWwV3aSugVa?si=S43FoBBCRRi9NMNqg-lYdA" title="Spotify"
          target="_blank"><i class="fab fa-spotify"></i></a>
        <a href="https://www.tiktok.com/@bluerra" title="TikTok" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://twitch.tv/bluerra_sai" title="Twitch" target="_blank"><i class="fab fa-twitch"></i></a>
      </div>
    </div>

    <footer>
      Copyright © 2025–present Bluerra-Sai // OutOfTune <br>
      Heavily inspired by <a href="https://github.com/spectrapulse" target="_blank">SpectraPulse</a>
    </footer>
  </div>

  <audio id="backgroundAudio" preload="auto" loop>
    <source src="./bgm.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <audio id="clickSound" preload="auto">
    <source src="./click-sound.mp3" type="audio/mpeg">
    <source src="./click-sound.ogg" type="audio/ogg">
    Your browser does not support the audio element.
  </audio>

  <script>
    let nameClickCount = 0;
    const maxClicks = 5;

    function handleNameClick() {
      nameClickCount++;
      playClickSound();

      const descriptionEl = document.getElementById('description');
      const easterEggEl = document.getElementById('easter-egg-text');

      if (nameClickCount === 1) {
        descriptionEl.style.display = 'none';
        easterEggEl.style.display = 'block';
        easterEggEl.textContent = 'boop!';
        easterEggEl.classList.remove('warning');
      } else if (nameClickCount >= maxClicks) {
        easterEggEl.textContent = 'Okay buddy, that\'s enough!';
        easterEggEl.classList.add('warning');
      }

      setTimeout(() => {
        if (nameClickCount < maxClicks) {
          nameClickCount = 0;
          descriptionEl.style.display = 'block';
          easterEggEl.style.display = 'none';
          easterEggEl.classList.remove('warning');
        }
      }, 3000);
    }

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute("data-theme");
      html.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }

    function playClickSound() {
      const clickSound = document.getElementById('clickSound');
      clickSound.currentTime = 0;
      clickSound.play().catch(error => {
        console.log('Click sound could not be played:', error);
      });
    }

    const audio = document.getElementById('backgroundAudio');

    function startBackgroundAudio() {
      audio.play().catch(error => {
        console.log('Audio autoplay prevented:', error);
        document.addEventListener('click', function () {
          if (audio.paused) {
            audio.play().catch(err => console.log('Audio play failed:', err));
          }
        }, { once: true });
      });
    }

    audio.volume = 0.15;
    const clickSound = document.getElementById('clickSound');
    clickSound.volume = 0.3;

    window.addEventListener('load', () => {
      startBackgroundAudio();
      setTimeout(() => {
        const intro = document.getElementById('intro-screen');
        if (intro) {
          intro.setAttribute('aria-hidden', 'true');
        }
      }, 2300);
    });

    document.addEventListener('click', function () {
      if (audio.paused) {
        startBackgroundAudio();
      }
    }, { once: true });
  </script>
</body>

</html>
